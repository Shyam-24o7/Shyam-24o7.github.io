<svg width="100%" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
<rect width="100%" height="100%" fill="#0b0c14" rx="6"/>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- X-axis arrow -->
<line x1="60" y1="340" x2="640" y2="340" stroke="rgba(222,220,209,0.4)" stroke-width="1" marker-end="url(#arrow)" style="stroke:rgba(222,220,209,0.4);stroke-width:1px;"/>
<text x="644" y="344" text-anchor="start" style="fill:rgb(110,125,145);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;font-size:11px;font-weight:400;">Pattern complexity →</text>

<!-- Y-axis arrow -->
<line x1="60" y1="340" x2="60" y2="30" stroke="rgba(222,220,209,0.4)" stroke-width="1" marker-end="url(#arrow)" style="stroke:rgba(222,220,209,0.4);stroke-width:1px;"/>
<text x="20" y="185" text-anchor="middle" transform="rotate(-90,20,185)" style="fill:rgb(110,125,145);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;font-size:11px;font-weight:400;text-anchor:middle;">Hardware cost ↑</text>

<!-- Complexity tick labels -->
<text x="110" y="358" text-anchor="middle" style="fill:rgb(110,125,145);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;font-size:10px;font-weight:400;">Sequential</text>
<text x="240" y="358" text-anchor="middle" style="fill:rgb(110,125,145);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;font-size:10px;font-weight:400;">Stride</text>
<text x="380" y="358" text-anchor="middle" style="fill:rgb(110,125,145);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;font-size:10px;font-weight:400;">Stream / GHB</text>
<text x="530" y="358" text-anchor="middle" style="fill:rgb(110,125,145);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;font-size:10px;font-weight:400;">Correlated / ML</text>

<!-- Divider lines -->
<line x1="174" y1="50" x2="174" y2="340" stroke="rgba(222,220,209,0.1)" stroke-width="0.5" stroke-dasharray="4 4" style="stroke:rgba(222,220,209,0.1);"/>
<line x1="314" y1="50" x2="314" y2="340" stroke="rgba(222,220,209,0.1)" stroke-width="0.5" stroke-dasharray="4 4" style="stroke:rgba(222,220,209,0.1);"/>
<line x1="454" y1="50" x2="454" y2="340" stroke="rgba(222,220,209,0.1)" stroke-width="0.5" stroke-dasharray="4 4" style="stroke:rgba(222,220,209,0.1);"/>

<!-- === TIER 1: Next-line (green) === -->
<g style="font-family:&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;">
  <rect x="72" y="270" width="88" height="60" rx="5" stroke-width="0.5" style="fill:rgb(5,54,42);stroke:rgb(0,214,162);stroke-width:0.5px;"/>
  <text x="116" y="294" text-anchor="middle" dominant-baseline="central" style="fill:rgb(112,244,200);stroke:none;font-size:12px;font-weight:600;">Next-line</text>
  <text x="116" y="314" text-anchor="middle" dominant-baseline="central" style="fill:rgb(0,214,162);stroke:none;font-size:10px;font-weight:400;">always-on</text>
</g>

<!-- === TIER 2: Stream detector (green, taller) === -->
<g style="font-family:&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;">
  <rect x="72" y="188" width="88" height="72" rx="5" stroke-width="0.5" style="fill:rgb(5,54,42);stroke:rgb(0,214,162);stroke-width:0.5px;"/>
  <text x="116" y="215" text-anchor="middle" dominant-baseline="central" style="fill:rgb(112,244,200);stroke:none;font-size:12px;font-weight:600;">Stream</text>
  <text x="116" y="233" text-anchor="middle" dominant-baseline="central" style="fill:rgb(0,214,162);stroke:none;font-size:10px;font-weight:400;">detector</text>
  <text x="116" y="249" text-anchor="middle" dominant-baseline="central" style="fill:rgb(0,214,162);stroke:none;font-size:10px;font-weight:400;">(L1 / L2)</text>
</g>

<!-- cost label -->
<text x="116" y="174" text-anchor="middle" style="fill:rgb(0,214,162);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;font-size:10px;font-weight:400;">low cost</text>

<!-- === TIER 3: RPT / Stride (blue) === -->
<g style="font-family:&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;">
  <rect x="194" y="210" width="106" height="120" rx="5" stroke-width="0.5" style="fill:rgb(11,38,80);stroke:rgb(48,148,255);stroke-width:0.5px;"/>
  <text x="247" y="246" text-anchor="middle" dominant-baseline="central" style="fill:rgb(147,200,255);stroke:none;font-size:12px;font-weight:600;">RPT / Stride</text>
  <text x="247" y="266" text-anchor="middle" dominant-baseline="central" style="fill:rgb(48,148,255);stroke:none;font-size:10px;font-weight:400;">PC-indexed table</text>
  <text x="247" y="284" text-anchor="middle" dominant-baseline="central" style="fill:rgb(48,148,255);stroke:none;font-size:10px;font-weight:400;">fixed stride</text>
  <text x="247" y="302" text-anchor="middle" dominant-baseline="central" style="fill:rgb(48,148,255);stroke:none;font-size:10px;font-weight:400;">confidence FSM</text>
</g>

<!-- === TIER 4: GHB / AMPM (blue, taller) === -->
<g style="font-family:&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;">
  <rect x="194" y="130" width="106" height="72" rx="5" stroke-width="0.5" style="fill:rgb(11,38,80);stroke:rgb(48,148,255);stroke-width:0.5px;"/>
  <text x="247" y="158" text-anchor="middle" dominant-baseline="central" style="fill:rgb(147,200,255);stroke:none;font-size:12px;font-weight:600;">GHB / AMPM</text>
  <text x="247" y="176" text-anchor="middle" dominant-baseline="central" style="fill:rgb(48,148,255);stroke:none;font-size:10px;font-weight:400;">delta correlations</text>
  <text x="247" y="194" text-anchor="middle" dominant-baseline="central" style="fill:rgb(48,148,255);stroke:none;font-size:10px;font-weight:400;">history buffer</text>
</g>

<!-- cost label -->
<text x="247" y="116" text-anchor="middle" style="fill:rgb(48,148,255);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;font-size:10px;font-weight:400;">moderate cost</text>

<!-- === TIER 5: SMS / SPP / BOP / Berti (orange) === -->
<g style="font-family:&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;">
  <rect x="324" y="158" width="116" height="172" rx="5" stroke-width="0.5" style="fill:rgb(60,26,2);stroke:rgb(255,162,0);stroke-width:0.5px;"/>
  <text x="382" y="190" text-anchor="middle" dominant-baseline="central" style="fill:rgb(255,222,80);stroke:none;font-size:12px;font-weight:600;">SMS / SPP</text>
  <text x="382" y="210" text-anchor="middle" dominant-baseline="central" style="fill:rgb(255,162,0);stroke:none;font-size:10px;font-weight:400;">spatial patterns</text>
  <text x="382" y="228" text-anchor="middle" dominant-baseline="central" style="fill:rgb(255,162,0);stroke:none;font-size:10px;font-weight:400;">page-level history</text>
  <text x="382" y="252" text-anchor="middle" dominant-baseline="central" style="fill:rgb(255,222,80);stroke:none;font-size:12px;font-weight:600;">BOP / Berti</text>
  <text x="382" y="272" text-anchor="middle" dominant-baseline="central" style="fill:rgb(255,162,0);stroke:none;font-size:10px;font-weight:400;">offset testing</text>
  <text x="382" y="290" text-anchor="middle" dominant-baseline="central" style="fill:rgb(255,162,0);stroke:none;font-size:10px;font-weight:400;">multi-delta</text>
  <text x="382" y="308" text-anchor="middle" dominant-baseline="central" style="fill:rgb(255,162,0);stroke:none;font-size:10px;font-weight:400;">counters + table</text>
</g>

<!-- === TIER 6: Bingo / DSPatch (orange, taller) === -->
<g style="font-family:&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;">
  <rect x="324" y="88" width="116" height="62" rx="5" stroke-width="0.5" style="fill:rgb(60,26,2);stroke:rgb(255,162,0);stroke-width:0.5px;"/>
  <text x="382" y="112" text-anchor="middle" dominant-baseline="central" style="fill:rgb(255,222,80);stroke:none;font-size:12px;font-weight:600;">Bingo / DSPatch</text>
  <text x="382" y="132" text-anchor="middle" dominant-baseline="central" style="fill:rgb(255,162,0);stroke:none;font-size:10px;font-weight:400;">fine-grain spatial</text>
  <text x="382" y="148" text-anchor="middle" dominant-baseline="central" style="fill:rgb(255,162,0);stroke:none;font-size:10px;font-weight:400;">signatures + FDIP</text>
</g>

<!-- cost label -->
<text x="382" y="74" text-anchor="middle" style="fill:rgb(255,162,0);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;font-size:10px;font-weight:400;">higher cost</text>

<!-- === TIER 7: Pythia / VLDP / Markov (purple) === -->
<g style="font-family:&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;">
  <rect x="464" y="118" width="152" height="212" rx="5" stroke-width="0.5" style="fill:rgb(28,18,74);stroke:rgb(158,122,255);stroke-width:0.5px;"/>
  <text x="540" y="150" text-anchor="middle" dominant-baseline="central" style="fill:rgb(214,200,255);stroke:none;font-size:12px;font-weight:600;">Pythia / RL</text>
  <text x="540" y="170" text-anchor="middle" dominant-baseline="central" style="fill:rgb(158,122,255);stroke:none;font-size:10px;font-weight:400;">reward-signal</text>
  <text x="540" y="188" text-anchor="middle" dominant-baseline="central" style="fill:rgb(158,122,255);stroke:none;font-size:10px;font-weight:400;">feature table (QV)</text>
  <text x="540" y="212" text-anchor="middle" dominant-baseline="central" style="fill:rgb(214,200,255);stroke:none;font-size:12px;font-weight:600;">VLDP / Markov</text>
  <text x="540" y="232" text-anchor="middle" dominant-baseline="central" style="fill:rgb(158,122,255);stroke:none;font-size:10px;font-weight:400;">delta-chains</text>
  <text x="540" y="250" text-anchor="middle" dominant-baseline="central" style="fill:rgb(158,122,255);stroke:none;font-size:10px;font-weight:400;">transition table</text>
  <text x="540" y="274" text-anchor="middle" dominant-baseline="central" style="fill:rgb(214,200,255);stroke:none;font-size:12px;font-weight:600;">MLOP / Domino</text>
  <text x="540" y="294" text-anchor="middle" dominant-baseline="central" style="fill:rgb(158,122,255);stroke:none;font-size:10px;font-weight:400;">offset learning</text>
  <text x="540" y="312" text-anchor="middle" dominant-baseline="central" style="fill:rgb(158,122,255);stroke:none;font-size:10px;font-weight:400;">large history</text>
</g>

<!-- cost label -->
<text x="540" y="104" text-anchor="middle" style="fill:rgb(158,122,255);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;font-size:10px;font-weight:400;">research / ML cost</text>

<!-- Title -->
<text x="340" y="386" text-anchor="middle" style="fill:rgb(110,125,145);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;font-size:11px;font-weight:400;">Hardware prefetcher landscape: pattern complexity vs. implementation cost</text>
</svg>
