<!-- Caption -->
<text x="340" y="316" text-anchor="middle" style="fill:rgb(110, 125, 145);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">The row buffer is DRAM's implicit prefetcher — opening a row copies 8 KB into fast sense amplifiers.</text>
<text x="340" y="334" text-anchor="middle" style="fill:rgb(110, 125, 145);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Sequential access stays in the open row (hit, ~15 ns). Random access forces repeated close/open cycles (~60 ns).</text>
<text x="340" y="352" text-anchor="middle" style="fill:rgb(110, 125, 145);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">This physical gap persists beyond all cache levels — the reason sequential is always faster than random.</text>
</svg>