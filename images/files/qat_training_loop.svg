<svg width="100%" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="680" height="260" fill="#1e293b"/>

  <!-- Title -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="#f8fafc" x="340" y="28" text-anchor="middle">Quantization-Aware Training (QAT) — training loop</text>

  <!-- Forward pass label -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#22c55e" x="40" y="68" font-weight="500">FORWARD</text>

  <!-- Step 1: Pre-trained FP32 weights -->
  <rect x="40" y="78" width="110" height="48" rx="8" fill="#1a1040" stroke="#6366f1" stroke-width="0.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#a5b4fc" x="95" y="98" text-anchor="middle">FP32 weights</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#818cf8" x="95" y="116" text-anchor="middle">(pre-trained)</text>

  <!-- Arrow -->
  <line x1="152" y1="102" x2="170" y2="102" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 2: Fake-quant node (weights) -->
  <rect x="173" y="78" width="110" height="48" rx="8" fill="#2d1b00" stroke="#f59e0b" stroke-width="1.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#fcd34d" x="228" y="98" text-anchor="middle">Fake-quant</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#fbbf24" x="228" y="116" text-anchor="middle">round → FP32</text>

  <!-- Arrow -->
  <line x1="285" y1="102" x2="303" y2="102" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 3: Layer compute -->
  <rect x="306" y="78" width="110" height="48" rx="8" fill="#1a1040" stroke="#6366f1" stroke-width="0.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#a5b4fc" x="361" y="98" text-anchor="middle">Layer op</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#818cf8" x="361" y="116" text-anchor="middle">(matmul etc.)</text>

  <!-- Arrow -->
  <line x1="418" y1="102" x2="436" y2="102" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 4: Fake-quant activations -->
  <rect x="439" y="78" width="110" height="48" rx="8" fill="#2d1b00" stroke="#f59e0b" stroke-width="1.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#fcd34d" x="494" y="98" text-anchor="middle">Fake-quant</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#fbbf24" x="494" y="116" text-anchor="middle">activations</text>

  <!-- Arrow -->
  <line x1="551" y1="102" x2="569" y2="102" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 5: Loss -->
  <rect x="572" y="78" width="72" height="48" rx="8" fill="#2d0a0a" stroke="#ef4444" stroke-width="0.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#fca5a5" x="608" y="102" text-anchor="middle">Loss</text>

  <!-- Backward pass label -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#ef4444" x="40" y="160" font-weight="500">BACKWARD (STE)</text>

  <!-- Backward arrows (dashed, red) going right to left under the forward path -->
  <line x1="572" y1="170" x2="40" y2="170" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <!-- STE note -->
  <rect x="230" y="158" width="210" height="24" rx="4" fill="#2d0a0a" stroke="#ef4444" stroke-width="0.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#fca5a5" x="335" y="174" text-anchor="middle">STE: gradient passes through as identity</text>

  <!-- Update note -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="95" y="198" text-anchor="middle">Weights updated</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="95" y="212" text-anchor="middle">in FP32</text>

  <!-- Fake-quant badge explanation -->
  <rect x="172" y="138" width="113" height="16" rx="4" fill="#2d1b00"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#fbbf24" x="228" y="150" text-anchor="middle">round + clamp in forward</text>
  <rect x="438" y="138" width="113" height="16" rx="4" fill="#2d1b00"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#fbbf24" x="494" y="150" text-anchor="middle">round + clamp in forward</text>

  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="340" y="234" text-anchor="middle">After fine-tuning, remove fake-quant nodes and quantize weights for real</text>
</svg>
