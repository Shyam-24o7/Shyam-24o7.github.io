<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="680" height="300" fill="#1e293b"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="#f8fafc" x="340" y="24" text-anchor="middle">Network slimming — BN γ scaling factors as channel importance</text>

  <!-- Axes -->
  <line x1="60" y1="220" x2="620" y2="220" stroke="#475569" stroke-width="0.5"/>
  <line x1="60" y1="60" x2="60" y2="220" stroke="#475569" stroke-width="0.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="340" y="244" text-anchor="middle">Channel index</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" transform="rotate(-90 28 145)" x="28" y="145" text-anchor="middle">γ (BN scale)</text>

  <!-- Threshold line -->
  <line x1="60" y1="180" x2="620" y2="180" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#ef4444" x="625" y="184" text-anchor="start">threshold</text>

  <!-- Bars: varying heights, some below threshold (pruned) -->
  <!-- ch1: high (active) -->
  <rect x="70" y="100" width="20" height="120" rx="2" fill="#22c55e"/>
  <!-- ch2: low (pruned) -->
  <rect x="102" y="205" width="20" height="15" rx="2" fill="#ef4444"/>
  <!-- ch3: high -->
  <rect x="134" y="115" width="20" height="105" rx="2" fill="#22c55e"/>
  <!-- ch4: medium high -->
  <rect x="166" y="130" width="20" height="90" rx="2" fill="#4ade80"/>
  <!-- ch5: low (pruned) -->
  <rect x="198" y="208" width="20" height="12" rx="2" fill="#ef4444"/>
  <!-- ch6: high -->
  <rect x="230" y="95" width="20" height="125" rx="2" fill="#22c55e"/>
  <!-- ch7: medium -->
  <rect x="262" y="145" width="20" height="75" rx="2" fill="#4ade80"/>
  <!-- ch8: low (pruned) -->
  <rect x="294" y="206" width="20" height="14" rx="2" fill="#ef4444"/>
  <!-- ch9: high -->
  <rect x="326" y="105" width="20" height="115" rx="2" fill="#22c55e"/>
  <!-- ch10: medium -->
  <rect x="358" y="140" width="20" height="80" rx="2" fill="#4ade80"/>
  <!-- ch11: very low (pruned) -->
  <rect x="390" y="212" width="20" height="8" rx="2" fill="#ef4444"/>
  <!-- ch12: high -->
  <rect x="422" y="110" width="20" height="110" rx="2" fill="#22c55e"/>
  <!-- ch13: medium high -->
  <rect x="454" y="125" width="20" height="95" rx="2" fill="#4ade80"/>
  <!-- ch14: medium -->
  <rect x="486" y="148" width="20" height="72" rx="2" fill="#4ade80"/>
  <!-- ch15: low (pruned) -->
  <rect x="518" y="207" width="20" height="13" rx="2" fill="#ef4444"/>
  <!-- ch16: high -->
  <rect x="550" y="98" width="20" height="122" rx="2" fill="#22c55e"/>

  <!-- Labels for x axis -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#94a3b8" x="80" y="234" text-anchor="middle">1</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#94a3b8" x="208" y="234" text-anchor="middle">5</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#94a3b8" x="336" y="234" text-anchor="middle">9</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#94a3b8" x="400" y="234" text-anchor="middle">11</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#94a3b8" x="528" y="234" text-anchor="middle">15</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#94a3b8" x="560" y="234" text-anchor="middle">16</text>

  <!-- Legend -->
  <rect x="160" y="258" width="14" height="12" rx="2" fill="#22c55e"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="178" y="269">γ above threshold → keep channel</text>
  <rect x="400" y="258" width="14" height="12" rx="2" fill="#ef4444"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="418" y="269">γ ≈ 0 → prune channel</text>

  <!-- Note on L1 regularization -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="340" y="288" text-anchor="middle">L1 regularization on γ during training drives unimportant channels toward zero</text>
</svg>
