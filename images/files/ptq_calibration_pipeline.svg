<svg width="100%" viewBox="0 0 680 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="680" height="220" fill="#1e293b"/>

  <!-- Box 1: Calibration data -->
  <g>
    <rect x="20" y="70" width="120" height="56" rx="8" fill="#0d2216" stroke="#22c55e" stroke-width="0.5"/>
    <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#4ade80" x="80" y="94" text-anchor="middle">Calibration</text>
    <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#4ade80" x="80" y="110" text-anchor="middle">data</text>
  </g>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="80" y="144" text-anchor="middle">100–1000 samples</text>

  <!-- Arrow 1 -->
  <line x1="141" y1="98" x2="162" y2="98" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Box 2: FP32 model -->
  <g>
    <rect x="165" y="70" width="120" height="56" rx="8" fill="#1a1040" stroke="#6366f1" stroke-width="0.5"/>
    <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#a5b4fc" x="225" y="94" text-anchor="middle">FP32 model</text>
    <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#a5b4fc" x="225" y="110" text-anchor="middle">forward pass</text>
  </g>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="225" y="144" text-anchor="middle">Activations recorded</text>

  <!-- Arrow 2 -->
  <line x1="286" y1="98" x2="307" y2="98" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Box 3: Histograms -->
  <g>
    <rect x="310" y="70" width="120" height="56" rx="8" fill="#2d1b00" stroke="#f59e0b" stroke-width="0.5"/>
    <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#fcd34d" x="370" y="94" text-anchor="middle">Activation</text>
    <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#fcd34d" x="370" y="110" text-anchor="middle">histograms</text>
  </g>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="370" y="144" text-anchor="middle">Per layer, per tensor</text>

  <!-- Arrow 3 -->
  <line x1="431" y1="98" x2="452" y2="98" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Box 4: Scale factors -->
  <g>
    <rect x="455" y="70" width="120" height="56" rx="8" fill="#2d0a0a" stroke="#ef4444" stroke-width="0.5"/>
    <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#fca5a5" x="515" y="94" text-anchor="middle">Scale factor</text>
    <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#fca5a5" x="515" y="110" text-anchor="middle">computation</text>
  </g>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="515" y="144" text-anchor="middle">min/max → clamp range</text>

  <!-- Arrow 4 -->
  <line x1="576" y1="98" x2="597" y2="98" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Box 5: INT8 model -->
  <g>
    <rect x="600" y="70" width="60" height="56" rx="8" fill="#0d2216" stroke="#22c55e" stroke-width="0.5"/>
    <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#4ade80" x="630" y="94" text-anchor="middle">INT8</text>
    <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#4ade80" x="630" y="110" text-anchor="middle">model</text>
  </g>

  <!-- Note: no gradient descent -->
  <rect x="230" y="168" width="220" height="28" rx="6" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#e2e8f0" x="340" y="187" text-anchor="middle">No gradient descent — inference only</text>

  <!-- Title -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="#f8fafc" x="340" y="36" text-anchor="middle">Post-Training Quantization (PTQ) — calibration pipeline</text>
</svg>
