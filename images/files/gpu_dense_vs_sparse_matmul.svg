<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="680" height="300" fill="#1e293b"/>
  <!-- LEFT: Dense matmul on GPU -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="#f8fafc" x="155" y="28" text-anchor="middle">Dense matmul</text>

  <!-- GPU tiles (4×3 blocks, all active) -->
  <g>
    <rect x="40" y="40" width="56" height="56" rx="3" fill="#6366f1" stroke="#1e293b" stroke-width="1.5"/>
    <rect x="98" y="40" width="56" height="56" rx="3" fill="#4f46e5" stroke="#1e293b" stroke-width="1.5"/>
    <rect x="156" y="40" width="56" height="56" rx="3" fill="#6366f1" stroke="#1e293b" stroke-width="1.5"/>
    <rect x="214" y="40" width="56" height="56" rx="3" fill="#4f46e5" stroke="#1e293b" stroke-width="1.5"/>

    <rect x="40" y="98" width="56" height="56" rx="3" fill="#4f46e5" stroke="#1e293b" stroke-width="1.5"/>
    <rect x="98" y="98" width="56" height="56" rx="3" fill="#6366f1" stroke="#1e293b" stroke-width="1.5"/>
    <rect x="156" y="98" width="56" height="56" rx="3" fill="#4f46e5" stroke="#1e293b" stroke-width="1.5"/>
    <rect x="214" y="98" width="56" height="56" rx="3" fill="#6366f1" stroke="#1e293b" stroke-width="1.5"/>

    <rect x="40" y="156" width="56" height="56" rx="3" fill="#6366f1" stroke="#1e293b" stroke-width="1.5"/>
    <rect x="98" y="156" width="56" height="56" rx="3" fill="#4f46e5" stroke="#1e293b" stroke-width="1.5"/>
    <rect x="156" y="156" width="56" height="56" rx="3" fill="#6366f1" stroke="#1e293b" stroke-width="1.5"/>
    <rect x="214" y="156" width="56" height="56" rx="3" fill="#4f46e5" stroke="#1e293b" stroke-width="1.5"/>
  </g>

  <!-- "All tiles execute" label -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#a5b4fc" x="155" y="232" text-anchor="middle">All tiles execute</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="155" y="248" text-anchor="middle">Time: T</text>

  <!-- Divider -->
  <line x1="340" y1="20" x2="340" y2="280" stroke="#334155" stroke-width="0.5"/>

  <!-- RIGHT: Sparse matmul on GPU (still all tiles execute!) -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="#f8fafc" x="520" y="28" text-anchor="middle">Sparse matmul (70% zeros)</text>

  <g>
    <!-- Row 1 tiles: 1 active, 3 with zeros -->
    <rect x="390" y="40" width="56" height="56" rx="3" fill="#6366f1" stroke="#1e293b" stroke-width="1.5"/>
    <rect x="448" y="40" width="56" height="56" rx="3" fill="#334155" stroke="#1e293b" stroke-width="1.5"/>
    <rect x="506" y="40" width="56" height="56" rx="3" fill="#334155" stroke="#1e293b" stroke-width="1.5"/>
    <rect x="564" y="40" width="56" height="56" rx="3" fill="#334155" stroke="#1e293b" stroke-width="1.5"/>
    <!-- Row 2 -->
    <rect x="390" y="98" width="56" height="56" rx="3" fill="#334155" stroke="#1e293b" stroke-width="1.5"/>
    <rect x="448" y="98" width="56" height="56" rx="3" fill="#4f46e5" stroke="#1e293b" stroke-width="1.5"/>
    <rect x="506" y="98" width="56" height="56" rx="3" fill="#334155" stroke="#1e293b" stroke-width="1.5"/>
    <rect x="564" y="98" width="56" height="56" rx="3" fill="#334155" stroke="#1e293b" stroke-width="1.5"/>
    <!-- Row 3 -->
    <rect x="390" y="156" width="56" height="56" rx="3" fill="#334155" stroke="#1e293b" stroke-width="1.5"/>
    <rect x="448" y="156" width="56" height="56" rx="3" fill="#334155" stroke="#1e293b" stroke-width="1.5"/>
    <rect x="506" y="156" width="56" height="56" rx="3" fill="#4f46e5" stroke="#1e293b" stroke-width="1.5"/>
    <rect x="564" y="156" width="56" height="56" rx="3" fill="#334155" stroke="#1e293b" stroke-width="1.5"/>
  </g>

  <!-- "All tiles STILL execute" label with warning -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#f87171" x="520" y="232" text-anchor="middle">All tiles still execute</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="520" y="248" text-anchor="middle">Time: still ~T</text>

  <!-- Key insight box -->
  <rect x="60" y="260" width="560" height="28" rx="6" fill="#2d0a0a" stroke="#ef4444" stroke-width="0.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#fca5a5" x="340" y="279" text-anchor="middle">GPU executes full dense tile regardless of zero content — sparsity is invisible to the hardware</text>

  <!-- Zero label -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#64748b" x="476" y="72" text-anchor="middle">0</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#64748b" x="534" y="72" text-anchor="middle">0</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#64748b" x="592" y="72" text-anchor="middle">0</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#64748b" x="418" y="128" text-anchor="middle">0</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#64748b" x="534" y="128" text-anchor="middle">0</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#64748b" x="592" y="128" text-anchor="middle">0</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#64748b" x="418" y="186" text-anchor="middle">0</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#64748b" x="476" y="186" text-anchor="middle">0</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#64748b" x="592" y="186" text-anchor="middle">0</text>
</svg>
