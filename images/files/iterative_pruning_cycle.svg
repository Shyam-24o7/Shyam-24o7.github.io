<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="680" height="360" fill="#1e293b"/>

  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="#f8fafc" x="340" y="24" text-anchor="middle">Iterative pruning — accuracy through multiple prune-and-fine-tune rounds</text>

  <!-- Axes -->
  <line x1="80" y1="280" x2="630" y2="280" stroke="#475569" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="80" y1="280" x2="80" y2="50" stroke="#475569" stroke-width="0.5" marker-end="url(#arrow)"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8" x="355" y="310" text-anchor="middle">Sparsity (% weights removed) →</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" transform="rotate(-90 28 175)" x="28" y="175" text-anchor="middle">Accuracy</text>

  <!-- Gridlines -->
  <line x1="80" y1="230" x2="630" y2="230" stroke="#334155" stroke-width="0.3" stroke-dasharray="3 3"/>
  <line x1="80" y1="180" x2="630" y2="180" stroke="#334155" stroke-width="0.3" stroke-dasharray="3 3"/>
  <line x1="80" y1="130" x2="630" y2="130" stroke="#334155" stroke-width="0.3" stroke-dasharray="3 3"/>
  <line x1="80" y1="90" x2="630" y2="90" stroke="#334155" stroke-width="0.3" stroke-dasharray="3 3"/>

  <!-- Y labels -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="74" y="284" text-anchor="end">60%</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="74" y="234" text-anchor="end">70%</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="74" y="184" text-anchor="end">80%</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="74" y="134" text-anchor="end">90%</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="74" y="94" text-anchor="end">100%</text>

  <!-- X tick labels -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="150" y="296" text-anchor="middle">0%</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="250" y="296" text-anchor="middle">30%</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="370" y="296" text-anchor="middle">60%</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="490" y="296" text-anchor="middle">80%</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="580" y="296" text-anchor="middle">90%</text>
  <line x1="150" y1="278" x2="150" y2="282" stroke="#475569" stroke-width="0.5"/>
  <line x1="250" y1="278" x2="250" y2="282" stroke="#475569" stroke-width="0.5"/>
  <line x1="370" y1="278" x2="370" y2="282" stroke="#475569" stroke-width="0.5"/>
  <line x1="490" y1="278" x2="490" y2="282" stroke="#475569" stroke-width="0.5"/>
  <line x1="580" y1="278" x2="580" y2="282" stroke="#475569" stroke-width="0.5"/>

  <!-- Baseline -->
  <line x1="80" y1="88" x2="630" y2="88" stroke="#64748b" stroke-width="1" stroke-dasharray="4 3"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#64748b" x="634" y="91">baseline</text>

  <!-- Sawtooth curve -->
  <polyline
    points="150,88 155,88 250,148 280,100 370,165 400,115 490,185 520,135 580,210 610,160"
    fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Dots at prune points (red) and recovery points (green) -->
  <circle cx="250" cy="148" r="5" fill="#ef4444"/>
  <circle cx="370" cy="165" r="5" fill="#ef4444"/>
  <circle cx="490" cy="185" r="5" fill="#ef4444"/>
  <circle cx="580" cy="210" r="5" fill="#ef4444"/>
  <circle cx="280" cy="100" r="5" fill="#22c55e"/>
  <circle cx="400" cy="115" r="5" fill="#22c55e"/>
  <circle cx="520" cy="135" r="5" fill="#22c55e"/>
  <circle cx="610" cy="160" r="5" fill="#22c55e"/>

  <!-- Annotations for first cycle -->
  <line x1="250" y1="148" x2="250" y2="210" stroke="#64748b" stroke-width="0.5" stroke-dasharray="2 2"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#f87171" x="253" y="218" text-anchor="start">prune</text>
  <line x1="280" y1="100" x2="280" y2="72" stroke="#64748b" stroke-width="0.5" stroke-dasharray="2 2"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#4ade80" x="283" y="70" text-anchor="start">fine-tune</text>

  <!-- Bracket showing net trend -->
  <line x1="155" y1="88" x2="610" y2="160" stroke="#64748b" stroke-width="0.8" stroke-dasharray="5 3" opacity="0.5"/>

  <!-- Legend -->
  <circle cx="170" cy="334" r="5" fill="#ef4444"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="180" y="338">Prune step — accuracy dips</text>
  <circle cx="370" cy="334" r="5" fill="#22c55e"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="380" y="338">Fine-tune — accuracy recovers</text>

  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="340" y="354" text-anchor="middle">Each round advances sparsity; 90%+ is achievable with small cumulative accuracy loss</text>
</svg>
