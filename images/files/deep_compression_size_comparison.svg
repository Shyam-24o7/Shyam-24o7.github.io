<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="680" height="320" fill="#1e293b"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="#f8fafc" x="340" y="24" text-anchor="middle">Model size before and after Deep Compression</text>

  <!-- Axes -->
  <line x1="80" y1="256" x2="620" y2="256" stroke="#475569" stroke-width="0.5"/>
  <line x1="80" y1="256" x2="80" y2="50" stroke="#475569" stroke-width="0.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="350" y="282" text-anchor="middle">Model size (MB)</text>

  <!-- Y-axis ticks -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="74" y="260" text-anchor="end">0</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="74" y="210" text-anchor="end">100</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="74" y="160" text-anchor="end">200</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="74" y="110" text-anchor="end">300</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="74" y="60" text-anchor="end">400+</text>
  <!-- Grid -->
  <line x1="80" y1="206" x2="620" y2="206" stroke="#334155" stroke-width="0.3" stroke-dasharray="3 3"/>
  <line x1="80" y1="156" x2="620" y2="156" stroke="#334155" stroke-width="0.3" stroke-dasharray="3 3"/>
  <line x1="80" y1="106" x2="620" y2="106" stroke="#334155" stroke-width="0.3" stroke-dasharray="3 3"/>
  <line x1="80" y1="56" x2="620" y2="56" stroke="#334155" stroke-width="0.3" stroke-dasharray="3 3"/>

  <!-- AlexNet BEFORE -->
  <rect x="130" y="173" width="80" height="83" rx="4" fill="#6366f1" stroke="#4f46e5" stroke-width="0.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#e2e8f0" x="170" y="165" text-anchor="middle">240 MB</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#e2e8f0" x="170" y="220" text-anchor="middle">AlexNet</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#c7d2fe" x="170" y="234" text-anchor="middle">original</text>

  <!-- AlexNet AFTER -->
  <rect x="230" y="240" width="80" height="16" rx="4" fill="#22c55e" stroke="#16a34a" stroke-width="0.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#e2e8f0" x="270" y="232" text-anchor="middle">6.9 MB</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#4ade80" x="270" y="270" text-anchor="middle">compressed</text>

  <!-- 35× label -->
  <line x1="170" y1="170" x2="270" y2="236" stroke="#94a3b8" stroke-width="0.8" stroke-dasharray="3 2"/>
  <rect x="188" y="192" width="36" height="18" rx="4" fill="#4f46e5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#f8fafc" x="206" y="205" text-anchor="middle">35×</text>

  <!-- VGG-16 BEFORE -->
  <rect x="380" y="66" width="80" height="190" rx="4" fill="#4f46e5" stroke="#4338ca" stroke-width="0.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#e2e8f0" x="420" y="56" text-anchor="middle">552 MB</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#e2e8f0" x="420" y="160" text-anchor="middle">VGG-16</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#c7d2fe" x="420" y="175" text-anchor="middle">original</text>

  <!-- VGG-16 AFTER -->
  <rect x="480" y="240" width="80" height="16" rx="4" fill="#22c55e" stroke="#16a34a" stroke-width="0.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#e2e8f0" x="520" y="232" text-anchor="middle">11.3 MB</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#4ade80" x="520" y="270" text-anchor="middle">compressed</text>

  <!-- 49× label -->
  <line x1="420" y1="62" x2="520" y2="236" stroke="#94a3b8" stroke-width="0.8" stroke-dasharray="3 2"/>
  <rect x="445" y="138" width="36" height="18" rx="4" fill="#166534"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#f8fafc" x="463" y="151" text-anchor="middle">49×</text>

  <!-- Legend -->
  <rect x="240" y="292" width="16" height="12" rx="2" fill="#4f46e5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="260" y="303">Original (FP32, dense)</text>
  <rect x="400" y="292" width="16" height="12" rx="2" fill="#22c55e"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="420" y="303">After Deep Compression</text>
</svg>
