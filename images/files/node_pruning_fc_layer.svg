<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="680" height="360" fill="#1e293b"/>

  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="#f8fafc" x="340" y="24" text-anchor="middle">Node pruning in fully-connected layers</text>

  <!-- ====== BEFORE (top) ====== -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="340" y="46" text-anchor="middle">Before pruning</text>

  <!-- W1: 4×3 matrix -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#e2e8f0" x="145" y="62" text-anchor="middle">W₁ (layer 1 weights)</text>
  <!-- 4 rows, 3 cols -->
  <g>
    <rect x="70" y="68" width="50" height="28" rx="2" fill="#6366f1" stroke="#1e293b" stroke-width="1"/>
    <rect x="122" y="68" width="50" height="28" rx="2" fill="#818cf8" stroke="#1e293b" stroke-width="1"/>
    <rect x="174" y="68" width="50" height="28" rx="2" fill="#4f46e5" stroke="#1e293b" stroke-width="1"/>
    <rect x="70" y="98" width="50" height="28" rx="2" fill="#818cf8" stroke="#1e293b" stroke-width="1"/>
    <rect x="122" y="98" width="50" height="28" rx="2" fill="#4f46e5" stroke="#1e293b" stroke-width="1"/>
    <rect x="174" y="98" width="50" height="28" rx="2" fill="#6366f1" stroke="#1e293b" stroke-width="1"/>
    <!-- Row 3: neuron being pruned (red) -->
    <rect x="70" y="128" width="50" height="28" rx="2" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="122" y="128" width="50" height="28" rx="2" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="174" y="128" width="50" height="28" rx="2" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="70" y="158" width="50" height="28" rx="2" fill="#4f46e5" stroke="#1e293b" stroke-width="1"/>
    <rect x="122" y="158" width="50" height="28" rx="2" fill="#6366f1" stroke="#1e293b" stroke-width="1"/>
    <rect x="174" y="158" width="50" height="28" rx="2" fill="#818cf8" stroke="#1e293b" stroke-width="1"/>
  </g>
  <!-- Row label -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#f87171" x="60" y="147" text-anchor="end">row 3 ✕</text>

  <!-- Arrow between matrices -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="265" y="100" text-anchor="middle">Neuron 3</text>
  <line x1="255" y1="114" x2="255" y2="148" stroke="#94a3b8" stroke-width="0.8"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="265" y="162" text-anchor="middle">activates →</text>
  <line x1="285" y1="113" x2="310" y2="113" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- W2: 3×4 matrix -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#e2e8f0" x="430" y="62" text-anchor="middle">W₂ (layer 2 weights)</text>
  <!-- 3 rows, 4 cols — col 3 gets pruned -->
  <g>
    <rect x="315" y="68" width="50" height="28" rx="2" fill="#16a34a" stroke="#1e293b" stroke-width="1"/>
    <rect x="367" y="68" width="50" height="28" rx="2" fill="#22c55e" stroke="#1e293b" stroke-width="1"/>
    <rect x="419" y="68" width="50" height="28" rx="2" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="471" y="68" width="50" height="28" rx="2" fill="#16a34a" stroke="#1e293b" stroke-width="1"/>
    <rect x="315" y="98" width="50" height="28" rx="2" fill="#22c55e" stroke="#1e293b" stroke-width="1"/>
    <rect x="367" y="98" width="50" height="28" rx="2" fill="#16a34a" stroke="#1e293b" stroke-width="1"/>
    <rect x="419" y="98" width="50" height="28" rx="2" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="471" y="98" width="50" height="28" rx="2" fill="#22c55e" stroke="#1e293b" stroke-width="1"/>
    <rect x="315" y="128" width="50" height="28" rx="2" fill="#16a34a" stroke="#1e293b" stroke-width="1"/>
    <rect x="367" y="128" width="50" height="28" rx="2" fill="#22c55e" stroke="#1e293b" stroke-width="1"/>
    <rect x="419" y="128" width="50" height="28" rx="2" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="471" y="128" width="50" height="28" rx="2" fill="#16a34a" stroke="#1e293b" stroke-width="1"/>
  </g>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#f87171" x="444" y="165" text-anchor="middle">col 3 ✕</text>

  <!-- Arrow down to after -->
  <line x1="340" y1="200" x2="340" y2="218" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="360" y="212" text-anchor="start">prune + fine-tune</text>

  <!-- ====== AFTER (bottom) ====== -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#4ade80" x="340" y="236" text-anchor="middle">After pruning — both matrices are smaller and still dense</text>

  <!-- W1 after: 3×3 -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#e2e8f0" x="145" y="252" text-anchor="middle">W₁ (3 neurons)</text>
  <g>
    <rect x="70" y="258" width="50" height="28" rx="2" fill="#6366f1" stroke="#1e293b" stroke-width="1"/>
    <rect x="122" y="258" width="50" height="28" rx="2" fill="#818cf8" stroke="#1e293b" stroke-width="1"/>
    <rect x="174" y="258" width="50" height="28" rx="2" fill="#4f46e5" stroke="#1e293b" stroke-width="1"/>
    <rect x="70" y="288" width="50" height="28" rx="2" fill="#818cf8" stroke="#1e293b" stroke-width="1"/>
    <rect x="122" y="288" width="50" height="28" rx="2" fill="#4f46e5" stroke="#1e293b" stroke-width="1"/>
    <rect x="174" y="288" width="50" height="28" rx="2" fill="#6366f1" stroke="#1e293b" stroke-width="1"/>
    <rect x="70" y="318" width="50" height="28" rx="2" fill="#4f46e5" stroke="#1e293b" stroke-width="1"/>
    <rect x="122" y="318" width="50" height="28" rx="2" fill="#6366f1" stroke="#1e293b" stroke-width="1"/>
    <rect x="174" y="318" width="50" height="28" rx="2" fill="#818cf8" stroke="#1e293b" stroke-width="1"/>
  </g>

  <!-- W2 after: 3×3 -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#e2e8f0" x="430" y="252" text-anchor="middle">W₂ (3 inputs)</text>
  <g>
    <rect x="315" y="258" width="50" height="28" rx="2" fill="#16a34a" stroke="#1e293b" stroke-width="1"/>
    <rect x="367" y="258" width="50" height="28" rx="2" fill="#22c55e" stroke="#1e293b" stroke-width="1"/>
    <rect x="419" y="258" width="50" height="28" rx="2" fill="#16a34a" stroke="#1e293b" stroke-width="1"/>
    <rect x="315" y="288" width="50" height="28" rx="2" fill="#22c55e" stroke="#1e293b" stroke-width="1"/>
    <rect x="367" y="288" width="50" height="28" rx="2" fill="#16a34a" stroke="#1e293b" stroke-width="1"/>
    <rect x="419" y="288" width="50" height="28" rx="2" fill="#22c55e" stroke="#1e293b" stroke-width="1"/>
    <rect x="315" y="318" width="50" height="28" rx="2" fill="#16a34a" stroke="#1e293b" stroke-width="1"/>
    <rect x="367" y="318" width="50" height="28" rx="2" fill="#22c55e" stroke="#1e293b" stroke-width="1"/>
    <rect x="419" y="318" width="50" height="28" rx="2" fill="#16a34a" stroke="#1e293b" stroke-width="1"/>
  </g>

  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="590" y="300" text-anchor="middle">Dense!</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#4ade80" x="590" y="318" text-anchor="middle">Real speedup</text>
</svg>
