<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="680" height="360" fill="#1e293b"/>

  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="#f8fafc" x="340" y="24" text-anchor="middle">Unstructured vs structured pruning — accuracy vs compression</text>

  <!-- Axes -->
  <line x1="80" y1="280" x2="600" y2="280" stroke="#475569" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="80" y1="280" x2="80" y2="50" stroke="#475569" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- Axis labels -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8" x="340" y="308" text-anchor="middle">Compression ratio →</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#64748b" x="340" y="322" text-anchor="middle">← fewer parameters remaining</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" transform="rotate(-90 28 175)" x="28" y="175" text-anchor="middle">Accuracy</text>

  <!-- Y gridlines + labels -->
  <line x1="80" y1="240" x2="600" y2="240" stroke="#334155" stroke-width="0.3" stroke-dasharray="3 3"/>
  <line x1="80" y1="200" x2="600" y2="200" stroke="#334155" stroke-width="0.3" stroke-dasharray="3 3"/>
  <line x1="80" y1="160" x2="600" y2="160" stroke="#334155" stroke-width="0.3" stroke-dasharray="3 3"/>
  <line x1="80" y1="120" x2="600" y2="120" stroke="#334155" stroke-width="0.3" stroke-dasharray="3 3"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="74" y="284" text-anchor="end">0%</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="74" y="244" text-anchor="end">25%</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="74" y="204" text-anchor="end">50%</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="74" y="164" text-anchor="end">75%</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="74" y="124" text-anchor="end">100%</text>

  <!-- X tick labels -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="150" y="296" text-anchor="middle">2×</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="250" y="296" text-anchor="middle">5×</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="370" y="296" text-anchor="middle">10×</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="490" y="296" text-anchor="middle">20×</text>
  <line x1="150" y1="278" x2="150" y2="282" stroke="#475569" stroke-width="0.5"/>
  <line x1="250" y1="278" x2="250" y2="282" stroke="#475569" stroke-width="0.5"/>
  <line x1="370" y1="278" x2="370" y2="282" stroke="#475569" stroke-width="0.5"/>
  <line x1="490" y1="278" x2="490" y2="282" stroke="#475569" stroke-width="0.5"/>

  <!-- Baseline (FP32, uncompressed) -->
  <line x1="80" y1="115" x2="600" y2="115" stroke="#64748b" stroke-width="1" stroke-dasharray="4 3"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#64748b" x="605" y="118">baseline</text>

  <!-- Unstructured pruning curve: stays flat long, then drops -->
  <polyline points="80,116 150,116 250,117 370,120 490,132 570,165"
    fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="80" cy="116" r="4" fill="#6366f1"/>
  <circle cx="150" cy="116" r="4" fill="#6366f1"/>
  <circle cx="250" cy="117" r="4" fill="#6366f1"/>
  <circle cx="370" cy="120" r="4" fill="#6366f1"/>
  <circle cx="490" cy="132" r="4" fill="#6366f1"/>
  <circle cx="570" cy="165" r="4" fill="#6366f1"/>

  <!-- Structured pruning curve: drops sooner -->
  <polyline points="80,116 150,118 250,130 370,158 490,205 570,248"
    fill="none" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="7 3"/>
  <circle cx="80" cy="116" r="4" fill="#f97316"/>
  <circle cx="150" cy="118" r="4" fill="#f97316"/>
  <circle cx="250" cy="130" r="4" fill="#f97316"/>
  <circle cx="370" cy="158" r="4" fill="#f97316"/>
  <circle cx="490" cy="205" r="4" fill="#f97316"/>
  <circle cx="570" cy="248" r="4" fill="#f97316"/>

  <!-- Annotations -->
  <rect x="390" y="90" width="190" height="44" rx="6" fill="#1a1040" stroke="#6366f1" stroke-width="0.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#a5b4fc" x="485" y="110" text-anchor="middle">Unstructured: high compression</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#818cf8" x="485" y="126" text-anchor="middle">but no GPU speedup</text>

  <rect x="390" y="216" width="190" height="44" rx="6" fill="#2d1000" stroke="#f97316" stroke-width="0.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#fdba74" x="485" y="236" text-anchor="middle">Structured: real speedup</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#fb923c" x="485" y="252" text-anchor="middle">coarser, more accuracy loss</text>

  <!-- Legend -->
  <line x1="120" y1="334" x2="150" y2="334" stroke="#6366f1" stroke-width="2.5"/>
  <circle cx="135" cy="334" r="4" fill="#6366f1"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" fill="#e2e8f0" x="156" y="338">Unstructured (weight) pruning</text>
  <line x1="380" y1="334" x2="410" y2="334" stroke="#f97316" stroke-width="2.5" stroke-dasharray="7 3"/>
  <circle cx="395" cy="334" r="4" fill="#f97316"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" fill="#e2e8f0" x="416" y="338">Structured (filter/channel) pruning</text>
</svg>
