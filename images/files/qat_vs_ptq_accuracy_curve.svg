<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="680" height="360" fill="#1e293b"/>

  <!-- Axes -->
  <line x1="80" y1="280" x2="600" y2="280" stroke="#475569" stroke-width="0.5"/>
  <line x1="80" y1="40" x2="80" y2="280" stroke="#475569" stroke-width="0.5"/>

  <!-- Y labels -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="72" y="285" text-anchor="end">60%</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="72" y="235" text-anchor="end">70%</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="72" y="185" text-anchor="end">80%</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="72" y="135" text-anchor="end">90%</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="72" y="85" text-anchor="end">100%</text>
  <!-- Gridlines -->
  <line x1="80" y1="230" x2="600" y2="230" stroke="#334155" stroke-width="0.3" stroke-dasharray="3 3"/>
  <line x1="80" y1="180" x2="600" y2="180" stroke="#334155" stroke-width="0.3" stroke-dasharray="3 3"/>
  <line x1="80" y1="130" x2="600" y2="130" stroke="#334155" stroke-width="0.3" stroke-dasharray="3 3"/>
  <line x1="80" y1="80" x2="600" y2="80" stroke="#334155" stroke-width="0.3" stroke-dasharray="3 3"/>

  <!-- X labels -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" fill="#e2e8f0" x="160" y="300" text-anchor="middle">FP32</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" fill="#e2e8f0" x="310" y="300" text-anchor="middle">INT8</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" fill="#e2e8f0" x="460" y="300" text-anchor="middle">INT4</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" fill="#e2e8f0" x="560" y="300" text-anchor="middle">INT2</text>

  <!-- X tick marks -->
  <line x1="160" y1="278" x2="160" y2="282" stroke="#475569" stroke-width="0.5"/>
  <line x1="310" y1="278" x2="310" y2="282" stroke="#475569" stroke-width="0.5"/>
  <line x1="460" y1="278" x2="460" y2="282" stroke="#475569" stroke-width="0.5"/>
  <line x1="560" y1="278" x2="560" y2="282" stroke="#475569" stroke-width="0.5"/>

  <!-- FP32 baseline (dashed) -->
  <line x1="80" y1="78" x2="600" y2="78" stroke="#64748b" stroke-width="1" stroke-dasharray="4 3"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#64748b" x="605" y="82" text-anchor="start">FP32</text>

  <!-- QAT curve — stays high -->
  <polyline points="160,78 310,82 460,112 560,160"
    fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- QAT dots -->
  <circle cx="160" cy="78" r="5" fill="#6366f1"/>
  <circle cx="310" cy="82" r="5" fill="#6366f1"/>
  <circle cx="460" cy="112" r="5" fill="#6366f1"/>
  <circle cx="560" cy="160" r="5" fill="#6366f1"/>

  <!-- PTQ curve — drops sooner -->
  <polyline points="160,78 310,88 460,175 560,252"
    fill="none" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6 3"/>
  <!-- PTQ dots -->
  <circle cx="160" cy="78" r="5" fill="#f97316"/>
  <circle cx="310" cy="88" r="5" fill="#f97316"/>
  <circle cx="460" cy="175" r="5" fill="#f97316"/>
  <circle cx="560" cy="252" r="5" fill="#f97316"/>

  <!-- Gap annotation at INT4 -->
  <line x1="475" y1="112" x2="475" y2="175" stroke="#64748b" stroke-width="1" stroke-dasharray="2 2"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#e2e8f0" x="490" y="148" text-anchor="start">QAT</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="490" y="162" text-anchor="start">advantage</text>

  <!-- Legend -->
  <line x1="200" y1="330" x2="230" y2="330" stroke="#6366f1" stroke-width="2.5"/>
  <circle cx="215" cy="330" r="4" fill="#6366f1"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" fill="#e2e8f0" x="236" y="334">QAT</text>
  <line x1="310" y1="330" x2="340" y2="330" stroke="#f97316" stroke-width="2.5" stroke-dasharray="6 3"/>
  <circle cx="325" cy="330" r="4" fill="#f97316"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" fill="#e2e8f0" x="346" y="334">PTQ</text>

  <!-- Axis labels -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8" x="340" y="324" text-anchor="middle">← more aggressive quantization</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="340" y="18" text-anchor="middle">Top-1 accuracy vs bit-width (illustrative, ResNet-50-like)</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" transform="rotate(-90 22 180)" x="22" y="180" text-anchor="middle">Accuracy</text>
</svg>
