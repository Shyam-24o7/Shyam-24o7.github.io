  <rect x="60" y="172" width="175" height="18" rx="3" fill="#991b1b"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#f8fafc" x="147" y="185" text-anchor="middle">FULL WARP EXECUTES (96.9% zeros!)</text>

  <!-- Key insight -->
  <rect x="60" y="206" width="560" height="40" rx="6" fill="#2d0a0a" stroke="#ef4444" stroke-width="0.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#fca5a5" x="340" y="222" text-anchor="middle">One non-zero weight forces the entire 32-lane warp to execute.</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#fca5a5" x="340" y="238" text-anchor="middle">Scalpel: pruning must zero out complete SIMD-aligned groups to skip computation.</text>

  <!-- Labels for cases -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="200" y="128" text-anchor="middle">All 32 lanes zero → warp skipped</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="400" y="198" text-anchor="middle">31/32 lanes zero → warp still fully executed — the 1 non-zero prevents skip</text>
