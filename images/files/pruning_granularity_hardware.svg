<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="680" height="340" fill="#1e293b"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="#f8fafc" x="340" y="24" text-anchor="middle">Hardware-aware pruning — match granularity to target platform</text>

  <!-- Column headers -->
  <rect x="40" y="38" width="140" height="28" rx="4" fill="#334155"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#e2e8f0" x="110" y="57" text-anchor="middle">Hardware</text>
  <rect x="192" y="38" width="155" height="28" rx="4" fill="#334155"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#e2e8f0" x="270" y="57" text-anchor="middle">Pruning granularity</text>
  <rect x="359" y="38" width="140" height="28" rx="4" fill="#334155"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#e2e8f0" x="429" y="57" text-anchor="middle">Sparsity pattern</text>
  <rect x="511" y="38" width="140" height="28" rx="4" fill="#334155"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#e2e8f0" x="581" y="57" text-anchor="middle">Why it works</text>

  <!-- ===== Row 1: CPU ===== -->
  <rect x="40" y="78" width="140" height="52" rx="4" fill="#0d2216" stroke="#22c55e" stroke-width="0.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#4ade80" x="110" y="98" text-anchor="middle">CPU</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#86efac" x="110" y="116" text-anchor="middle">x86 / ARM</text>

  <rect x="192" y="78" width="155" height="52" rx="4" fill="#0d2216" stroke="#22c55e" stroke-width="0.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#4ade80" x="270" y="98" text-anchor="middle">Individual weights</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#86efac" x="270" y="116" text-anchor="middle">(unstructured fine-grained)</text>

  <!-- Pattern visual: scattered dots -->
  <rect x="359" y="78" width="140" height="52" rx="4" fill="#0d2216" stroke="#22c55e" stroke-width="0.5"/>
  <circle cx="385" cy="96" r="4" fill="#22c55e"/>
  <circle cx="395" cy="110" r="4" fill="#334155"/>
  <circle cx="408" cy="92" r="4" fill="#334155"/>
  <circle cx="418" cy="108" r="4" fill="#22c55e"/>
  <circle cx="430" cy="96" r="4" fill="#334155"/>
  <circle cx="443" cy="112" r="4" fill="#334155"/>
  <circle cx="455" cy="90" r="4" fill="#22c55e"/>
  <circle cx="465" cy="106" r="4" fill="#334155"/>
  <circle cx="478" cy="96" r="4" fill="#334155"/>
  <circle cx="488" cy="110" r="4" fill="#22c55e"/>

  <rect x="511" y="78" width="140" height="52" rx="4" fill="#0d2216" stroke="#22c55e" stroke-width="0.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#4ade80" x="581" y="98" text-anchor="middle">Scalar units can</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#4ade80" x="581" y="114" text-anchor="middle">skip individual zeros</text>

  <!-- ===== Row 2: GPU ===== -->
  <rect x="40" y="142" width="140" height="52" rx="4" fill="#1a1040" stroke="#6366f1" stroke-width="0.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#a5b4fc" x="110" y="162" text-anchor="middle">GPU</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#818cf8" x="110" y="180" text-anchor="middle">NVIDIA / AMD</text>

  <rect x="192" y="142" width="155" height="52" rx="4" fill="#1a1040" stroke="#6366f1" stroke-width="0.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#a5b4fc" x="270" y="162" text-anchor="middle">SIMD-aligned groups</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#818cf8" x="270" y="180" text-anchor="middle">(warp-width blocks)</text>

  <!-- Pattern: grouped blocks -->
  <rect x="359" y="142" width="140" height="52" rx="4" fill="#1a1040" stroke="#6366f1" stroke-width="0.5"/>
  <!-- Group of zeros -->
  <rect x="375" y="156" width="12" height="12" rx="1" fill="#334155"/>
  <rect x="389" y="156" width="12" height="12" rx="1" fill="#334155"/>
  <rect x="403" y="156" width="12" height="12" rx="1" fill="#334155"/>
  <rect x="417" y="156" width="12" height="12" rx="1" fill="#334155"/>
  <!-- Group of nonzero -->
  <rect x="435" y="156" width="12" height="12" rx="1" fill="#6366f1"/>
  <rect x="449" y="156" width="12" height="12" rx="1" fill="#4f46e5"/>
  <rect x="463" y="156" width="12" height="12" rx="1" fill="#6366f1"/>
  <rect x="477" y="156" width="12" height="12" rx="1" fill="#4f46e5"/>
  <!-- Row 2 of pattern: another all-zero group -->
  <rect x="375" y="172" width="12" height="12" rx="1" fill="#334155"/>
  <rect x="389" y="172" width="12" height="12" rx="1" fill="#334155"/>
  <rect x="403" y="172" width="12" height="12" rx="1" fill="#334155"/>
  <rect x="417" y="172" width="12" height="12" rx="1" fill="#334155"/>
  <rect x="435" y="172" width="12" height="12" rx="1" fill="#4f46e5"/>
  <rect x="449" y="172" width="12" height="12" rx="1" fill="#6366f1"/>
  <rect x="463" y="172" width="12" height="12" rx="1" fill="#4f46e5"/>
  <rect x="477" y="172" width="12" height="12" rx="1" fill="#6366f1"/>

  <rect x="511" y="142" width="140" height="52" rx="4" fill="#1a1040" stroke="#6366f1" stroke-width="0.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#a5b4fc" x="581" y="162" text-anchor="middle">Full group zero →</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#a5b4fc" x="581" y="178" text-anchor="middle">warp skip enabled</text>

  <!-- ===== Row 3: Edge NPU ===== -->
  <rect x="40" y="206" width="140" height="52" rx="4" fill="#2d1b00" stroke="#f59e0b" stroke-width="0.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#fcd34d" x="110" y="226" text-anchor="middle">Edge NPU / DSP</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#fbbf24" x="110" y="244" text-anchor="middle">mobile / embedded</text>

  <rect x="192" y="206" width="155" height="52" rx="4" fill="#2d1b00" stroke="#f59e0b" stroke-width="0.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#fcd34d" x="270" y="226" text-anchor="middle">Filter / channel level</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#fbbf24" x="270" y="244" text-anchor="middle">(structured removal)</text>

  <!-- Pattern: full rows removed -->
  <rect x="359" y="206" width="140" height="52" rx="4" fill="#2d1b00" stroke="#f59e0b" stroke-width="0.5"/>
  <!-- Row 1 active -->
  <rect x="375" y="218" width="110" height="10" rx="2" fill="#f59e0b"/>
  <!-- Row 2 removed (strikethrough) -->
  <rect x="375" y="232" width="110" height="10" rx="2" fill="#334155" stroke="#475569" stroke-width="0.5" stroke-dasharray="3 2"/>
  <line x1="375" y1="237" x2="485" y2="237" stroke="#ef4444" stroke-width="1"/>
  <!-- Row 3 active -->
  <rect x="375" y="246" width="110" height="10" rx="2" fill="#f59e0b"/>

  <rect x="511" y="206" width="140" height="52" rx="4" fill="#2d1b00" stroke="#f59e0b" stroke-width="0.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#fcd34d" x="581" y="226" text-anchor="middle">Fixed-size dense ops</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#fcd34d" x="581" y="242" text-anchor="middle">fewer filters = faster</text>

  <!-- Footer note -->
  <rect x="40" y="272" width="600" height="50" rx="6" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#e2e8f0" x="340" y="292" text-anchor="middle">Determine your target hardware BEFORE choosing a pruning strategy — not after</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="340" y="310" text-anchor="middle">Pruning first and asking later is backwards: hardware constraints should shape the strategy from the start</text>
</svg>
