<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="680" height="320" fill="#1e293b"/>
  <!-- LEFT: Per-tensor -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="#f8fafc" x="160" y="30" text-anchor="middle">Per-tensor quantization</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="160" y="46" text-anchor="middle">One scale for entire matrix</text>

  <!-- Weight matrix (4×6 grid) -->
  <g>
    <!-- Rows -->
    <rect x="50" y="60" width="220" height="34" rx="0" fill="#1a1040" stroke="#334155" stroke-width="0.5"/>
    <rect x="50" y="94" width="220" height="34" rx="0" fill="#1a1040" stroke="#334155" stroke-width="0.5"/>
    <rect x="50" y="128" width="220" height="34" rx="0" fill="#1a1040" stroke="#334155" stroke-width="0.5"/>
    <rect x="50" y="162" width="220" height="34" rx="0" fill="#1a1040" stroke="#334155" stroke-width="0.5"/>
    <!-- Column lines -->
    <line x1="87" y1="60" x2="87" y2="196" stroke="#334155" stroke-width="0.5"/>
    <line x1="124" y1="60" x2="124" y2="196" stroke="#334155" stroke-width="0.5"/>
    <line x1="161" y1="60" x2="161" y2="196" stroke="#334155" stroke-width="0.5"/>
    <line x1="198" y1="60" x2="198" y2="196" stroke="#334155" stroke-width="0.5"/>
    <line x1="235" y1="60" x2="235" y2="196" stroke="#334155" stroke-width="0.5"/>
    <!-- Outer rect -->
    <rect x="50" y="60" width="220" height="136" rx="4" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  </g>

  <!-- Single scale factor bracket -->
  <rect x="48" y="210" width="224" height="28" rx="4" fill="#4f46e5" stroke="none"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#f8fafc" x="160" y="229" text-anchor="middle">scale = 0.00784 · zero = 0</text>
  <line x1="160" y1="198" x2="160" y2="208" stroke="#6366f1" stroke-width="1"/>

  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="160" y="262" text-anchor="middle">One scale for all rows</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="160" y="278" text-anchor="middle">Rows with different ranges share same grid</text>

  <!-- Divider -->
  <line x1="340" y1="20" x2="340" y2="300" stroke="#334155" stroke-width="0.5"/>

  <!-- RIGHT: Per-channel -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="#f8fafc" x="510" y="30" text-anchor="middle">Per-channel quantization</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="510" y="46" text-anchor="middle">One scale per output channel (row)</text>

  <!-- Weight matrix (4×6 grid) with different colored rows -->
  <rect x="400" y="60" width="220" height="34" rx="0" fill="#0d2216" stroke="#22c55e" stroke-width="0.5"/>
  <rect x="400" y="94" width="220" height="34" rx="0" fill="#2d1b00" stroke="#f59e0b" stroke-width="0.5"/>
  <rect x="400" y="128" width="220" height="34" rx="0" fill="#2d0a0a" stroke="#ef4444" stroke-width="0.5"/>
  <rect x="400" y="162" width="220" height="34" rx="0" fill="#1a1040" stroke="#6366f1" stroke-width="0.5"/>
  <!-- Column lines -->
  <line x1="437" y1="60" x2="437" y2="196" stroke="#334155" stroke-width="0.5"/>
  <line x1="474" y1="60" x2="474" y2="196" stroke="#334155" stroke-width="0.5"/>
  <line x1="511" y1="60" x2="511" y2="196" stroke="#334155" stroke-width="0.5"/>
  <line x1="548" y1="60" x2="548" y2="196" stroke="#334155" stroke-width="0.5"/>
  <line x1="585" y1="60" x2="585" y2="196" stroke="#334155" stroke-width="0.5"/>
  <rect x="400" y="60" width="220" height="136" rx="4" fill="none" stroke="#475569" stroke-width="1"/>

  <!-- Per-row scale factor indicators -->
  <rect x="626" y="60" width="40" height="34" rx="4" fill="#22c55e" stroke="none"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#f8fafc" x="646" y="82" text-anchor="middle">s₁</text>
  <rect x="626" y="94" width="40" height="34" rx="4" fill="#f59e0b" stroke="none"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#f8fafc" x="646" y="116" text-anchor="middle">s₂</text>
  <rect x="626" y="128" width="40" height="34" rx="4" fill="#ef4444" stroke="none"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#f8fafc" x="646" y="150" text-anchor="middle">s₃</text>
  <rect x="626" y="162" width="40" height="34" rx="4" fill="#6366f1" stroke="none"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#f8fafc" x="646" y="184" text-anchor="middle">s₄</text>

  <!-- Label: each row own scale -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="510" y="262" text-anchor="middle">Each row has its own scale factor</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="510" y="278" text-anchor="middle">Better accuracy · minimal inference overhead</text>

  <!-- Title -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="340" y="310" text-anchor="middle">Per-channel is the recommended default for most deployments</text>
</svg>
