<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="680" height="320" fill="#1e293b"/>
  <!-- LEFT: Uniform quantization -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="#f8fafc" x="160" y="32" text-anchor="middle">Uniform quantization</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="160" y="48" text-anchor="middle">Equal spacing across range</text>

  <!-- Weight distribution bell curve (left) -->
  <path d="M40,200 Q80,195 100,180 Q120,155 140,110 Q150,85 160,75 Q170,85 180,110 Q200,155 220,180 Q240,195 280,200" fill="#1a1040" stroke="#6366f1" stroke-width="1"/>
  <line x1="40" y1="200" x2="280" y2="200" stroke="#475569" stroke-width="0.5"/>

  <!-- Uniform ticks (evenly spaced) -->
  <g stroke="#6366f1" stroke-width="1.5">
    <line x1="60" y1="195" x2="60" y2="210"/>
    <line x1="83" y1="195" x2="83" y2="210"/>
    <line x1="106" y1="195" x2="106" y2="210"/>
    <line x1="129" y1="195" x2="129" y2="210"/>
    <line x1="152" y1="195" x2="152" y2="210"/>
    <line x1="175" y1="195" x2="175" y2="210"/>
    <line x1="198" y1="195" x2="198" y2="210"/>
    <line x1="221" y1="195" x2="221" y2="210"/>
    <line x1="244" y1="195" x2="244" y2="210"/>
    <line x1="267" y1="195" x2="267" y2="210"/>
  </g>
  <!-- Range labels -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="60" y="224" text-anchor="middle">−1.0</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="163" y="224" text-anchor="middle">0</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="267" y="224" text-anchor="middle">+1.0</text>

  <!-- Wasted precision annotation -->
  <rect x="42" y="155" width="55" height="28" rx="3" fill="#2d0a0a" stroke="#ef4444" stroke-width="0.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#fca5a5" x="70" y="167" text-anchor="middle">wasted</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#fca5a5" x="70" y="178" text-anchor="middle">precision</text>
  <rect x="224" y="155" width="55" height="28" rx="3" fill="#2d0a0a" stroke="#ef4444" stroke-width="0.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#fca5a5" x="252" y="167" text-anchor="middle">wasted</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#fca5a5" x="252" y="178" text-anchor="middle">precision</text>

  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="160" y="256" text-anchor="middle">Uniform steps regardless of density</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="160" y="272" text-anchor="middle">Many grid levels in sparse tails</text>

  <!-- Divider -->
  <line x1="340" y1="20" x2="340" y2="300" stroke="#334155" stroke-width="0.5"/>

  <!-- RIGHT: Log quantization -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="#f8fafc" x="510" y="32" text-anchor="middle">Log (non-uniform) quantization</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="510" y="48" text-anchor="middle">Denser near zero, coarser at tails</text>

  <!-- Weight distribution bell curve (right) -->
  <path d="M390,200 Q430,195 450,180 Q470,155 490,110 Q500,85 510,75 Q520,85 530,110 Q550,155 570,180 Q590,195 630,200" fill="#0d2216" stroke="#22c55e" stroke-width="1"/>
  <line x1="390" y1="200" x2="630" y2="200" stroke="#475569" stroke-width="0.5"/>

  <!-- Log-spaced ticks: denser near 510 (zero), sparser toward edges -->
  <g stroke="#22c55e" stroke-width="1.5">
    <!-- Left half: 390..510 with log spacing (closer near 510) -->
    <line x1="415" y1="195" x2="415" y2="210"/>
    <line x1="435" y1="195" x2="435" y2="210"/>
    <line x1="452" y1="195" x2="452" y2="210"/>
    <line x1="466" y1="195" x2="466" y2="210"/>
    <line x1="478" y1="195" x2="478" y2="210"/>
    <line x1="488" y1="195" x2="488" y2="210"/>
    <line x1="497" y1="195" x2="497" y2="210"/>
    <line x1="504" y1="195" x2="504" y2="210"/>
    <line x1="509" y1="195" x2="509" y2="210"/>
    <!-- Right half: symmetric -->
    <line x1="516" y1="195" x2="516" y2="210"/>
    <line x1="523" y1="195" x2="523" y2="210"/>
    <line x1="532" y1="195" x2="532" y2="210"/>
    <line x1="542" y1="195" x2="542" y2="210"/>
    <line x1="554" y1="195" x2="554" y2="210"/>
    <line x1="568" y1="195" x2="568" y2="210"/>
    <line x1="585" y1="195" x2="585" y2="210"/>
    <line x1="605" y1="195" x2="605" y2="210"/>
  </g>

  <!-- Annotate dense center -->
  <rect x="472" y="155" width="75" height="28" rx="3" fill="#0d2216" stroke="#22c55e" stroke-width="0.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#4ade80" x="510" y="167" text-anchor="middle">fine precision</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#4ade80" x="510" y="178" text-anchor="middle">where weights cluster</text>

  <!-- Range labels -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="415" y="224" text-anchor="middle">−1.0</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="512" y="224" text-anchor="middle">0</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="605" y="224" text-anchor="middle">+1.0</text>

  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="510" y="256" text-anchor="middle">Grid denser near zero</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="510" y="272" text-anchor="middle">Matches the actual weight distribution</text>

  <!-- Title -->
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="340" y="300" text-anchor="middle">Same bit-width — different placement of grid levels</text>
</svg>
