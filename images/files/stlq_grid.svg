<svg width="100%" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="680" height="260" fill="#1e293b"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="#f8fafc" x="340" y="28" text-anchor="middle">Symmetric Two-Level Quantization (STLQ)</text>

  <!-- Main number line -->
  <line x1="60" y1="120" x2="620" y2="120" stroke="#94a3b8" stroke-width="1"/>

  <!-- Zero marker -->
  <line x1="340" y1="108" x2="340" y2="132" stroke="#e2e8f0" stroke-width="2"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#e2e8f0" x="340" y="148" text-anchor="middle">0</text>

  <!-- FINE grid near zero: ±120 from center, 15 steps = 16 ticks each side -->
  <!-- Left fine: 220..340 → 8 intervals of 15px -->
  <g stroke="#6366f1" stroke-width="1.5">
    <line x1="220" y1="113" x2="220" y2="127"/>
    <line x1="235" y1="113" x2="235" y2="127"/>
    <line x1="250" y1="113" x2="250" y2="127"/>
    <line x1="265" y1="113" x2="265" y2="127"/>
    <line x1="280" y1="113" x2="280" y2="127"/>
    <line x1="295" y1="113" x2="295" y2="127"/>
    <line x1="310" y1="113" x2="310" y2="127"/>
    <line x1="325" y1="113" x2="325" y2="127"/>
    <!-- Right fine: 340..460 -->
    <line x1="355" y1="113" x2="355" y2="127"/>
    <line x1="370" y1="113" x2="370" y2="127"/>
    <line x1="385" y1="113" x2="385" y2="127"/>
    <line x1="400" y1="113" x2="400" y2="127"/>
    <line x1="415" y1="113" x2="415" y2="127"/>
    <line x1="430" y1="113" x2="430" y2="127"/>
    <line x1="445" y1="113" x2="445" y2="127"/>
    <line x1="460" y1="113" x2="460" y2="127"/>
  </g>

  <!-- COARSE grid in outer regions: 60..220 → 4 intervals; 460..620 → 4 intervals -->
  <g stroke="#f59e0b" stroke-width="2">
    <line x1="100" y1="108" x2="100" y2="132"/>
    <line x1="140" y1="108" x2="140" y2="132"/>
    <line x1="180" y1="108" x2="180" y2="132"/>
    <line x1="220" y1="108" x2="220" y2="132"/>
    <line x1="460" y1="108" x2="460" y2="132"/>
    <line x1="500" y1="108" x2="500" y2="132"/>
    <line x1="540" y1="108" x2="540" y2="132"/>
    <line x1="580" y1="108" x2="580" y2="132"/>
  </g>
  <!-- End markers -->
  <line x1="60" y1="108" x2="60" y2="132" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="620" y1="108" x2="620" y2="132" stroke="#94a3b8" stroke-width="1.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="60" y="148" text-anchor="middle">−max</text>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" fill="#94a3b8" x="620" y="148" text-anchor="middle">+max</text>

  <!-- Region annotations -->
  <rect x="60" y="158" width="155" height="30" rx="4" fill="#2d1b00" stroke="#f59e0b" stroke-width="0.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#fcd34d" x="137" y="178" text-anchor="middle">Coarse — outlier region</text>

  <rect x="220" y="158" width="240" height="30" rx="4" fill="#1a1040" stroke="#6366f1" stroke-width="0.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#a5b4fc" x="340" y="178" text-anchor="middle">Fine — dense cluster region</text>

  <rect x="465" y="158" width="155" height="30" rx="4" fill="#2d1b00" stroke="#f59e0b" stroke-width="0.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#fcd34d" x="542" y="178" text-anchor="middle">Coarse — outlier region</text>

  <!-- Bracket lines -->
  <line x1="60" y1="155" x2="60" y2="150" stroke="#f59e0b" stroke-width="0.7"/>
  <line x1="215" y1="155" x2="215" y2="150" stroke="#f59e0b" stroke-width="0.7"/>
  <line x1="220" y1="155" x2="220" y2="150" stroke="#6366f1" stroke-width="0.7"/>
  <line x1="460" y1="155" x2="460" y2="150" stroke="#6366f1" stroke-width="0.7"/>
  <line x1="465" y1="155" x2="465" y2="150" stroke="#f59e0b" stroke-width="0.7"/>
  <line x1="620" y1="155" x2="620" y2="150" stroke="#f59e0b" stroke-width="0.7"/>

  <!-- Legend -->
  <line x1="260" y1="218" x2="285" y2="218" stroke="#6366f1" stroke-width="2"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="292" y="222">Fine-grained grid (near zero)</text>
  <line x1="440" y1="218" x2="465" y2="218" stroke="#f59e0b" stroke-width="2.5"/>
  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="472" y="222">Coarse grid (outliers)</text>

  <text font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" x="340" y="248" text-anchor="middle">Two-level grid handles both the dense center and large-magnitude outliers</text>
</svg>
